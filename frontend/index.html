<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="방방봐에서 공인중개사와 실시간 화상으로 매물을 확인하고 AI 리포트까지 받아보세요."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        const theme = localStorage.theme;
        const prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle(
          "dark",
          theme === "dark" || (!theme && prefersDark),
        );
      } catch (_) {}
    </script>
    <title>방방봐 | 실시간 화상 투어로 끝내는 임장</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
